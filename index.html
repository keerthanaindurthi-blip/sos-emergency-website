<!DOCTYPE html>
<html>
<head>
  <title>SOS</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #7a0014;
      font-family: Georgia, serif;
      color: #f5e6d3;
    }

    .container {
      text-align: center;
    }

    h1 {
      font-size: 60px;
      margin-bottom: 30px;
    }

    input {
      padding: 10px;
      width: 250px;
      border-radius: 5px;
      border: none;
      text-align: center;
      margin-bottom: 15px;
    }

    .btn {
      display: block;
      width: 200px;
      margin: 10px auto;
      padding: 12px;
      border-radius: 25px;
      border: none;
      cursor: pointer;
    }

    .start {
      background: #f5e6d3;
      color: #7a0014;
    }

    .stop {
      background: transparent;
      border: 1px solid #f5e6d3;
      color: #f5e6d3;
    }

    .status {
      margin-top: 15px;
      font-size: 14px;
    }

    #popup {
      display: none;
      position: fixed;
      top: 20px;
      right: 20px;
      background: #f5e6d3;
      color: #7a0014;
      padding: 15px;
      border-radius: 10px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>SOS</h1>

  <input id="username" placeholder="Enter your name" />

  <button class="btn start" onclick="startSOS()">Start SOS</button>
  <button class="btn stop" onclick="stopSOS()">Stop SOS</button>

  <div class="status" id="status"></div>
</div>

<div id="popup"></div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

let watchId = null;
let active = false;

function showPopup(msg) {
  const popup = document.getElementById("popup");
  popup.innerHTML = msg;
  popup.style.display = "block";

  setTimeout(() => {
    popup.style.display = "none";
  }, 4000);
}

function startSOS() {
  const name = document.getElementById("username").value.trim();
  const status = document.getElementById("status");

  if (!name) {
    status.innerText = "Enter your name";
    return;
  }

  if (!navigator.geolocation) {
    alert("Geolocation not supported");
    return;
  }

  active = true;
  status.innerText = "Starting SOS...";

  navigator.geolocation.getCurrentPosition((pos) => {
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;

    // send first SOS
    socket.emit("sos", { lat, lon, name });

    // popup
    const time = new Date().toLocaleTimeString();
    const link = `https://maps.google.com/?q=${lat},${lon}`;

    showPopup(`
      <b>SOS Sent 🚨</b><br>
      ${name}<br>
      Time: ${time}<br>
      <a href="${link}" target="_blank">View Location</a>
    `);

    // start live tracking
    watchId = navigator.geolocation.watchPosition((p) => {
      if (!active) return;

      socket.emit("location-update", {
        lat: p.coords.latitude,
        lon: p.coords.longitude,
        name
      });
    });

    status.innerText = "SOS ACTIVE - Tracking...";
  });
}

function stopSOS() {
  const status = document.getElementById("status");

  if (watchId !== null) {
    navigator.geolocation.clearWatch(watchId);
    watchId = null;
  }

  active = false;

  socket.disconnect();

  status.innerText = "SOS stopped";
}
</script>

</body>
</html>
