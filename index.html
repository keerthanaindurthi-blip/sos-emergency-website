<!DOCTYPE html>
<html>
<head>
<title>SOS Emergency</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  font-family:Arial;
  color:white;
  text-align:center;
}

.sos-btn{
  width:180px;
  height:180px;
  border-radius:50%;
  border:none;
  background:red;
  color:white;
  font-size:28px;
  cursor:pointer;
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(255,0,0,0.7);}
  70%{box-shadow:0 0 0 25px rgba(255,0,0,0);}
  100%{box-shadow:0 0 0 0 rgba(255,0,0,0);}
}

.stop-btn{
  margin-top:20px;
  padding:10px 20px;
  font-size:16px;
  background:black;
  color:white;
  border:none;
  cursor:pointer;
}

#statusText{
  margin-top:20px;
}
</style>

</head>

<body>

<div>
<h1>🚨 SOS Emergency</h1>

<button class="sos-btn" onclick="startTracking()">SOS</button><br>
<button class="stop-btn" onclick="stopTracking()">STOP</button>

<p id="statusText"></p>
</div>

<script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
<script>

const socket = io("YOUR_BACKEND_URL"); // replace
let watchId = null;

function startTracking(){

  if(watchId !== null){
    alert("SOS already active");
    return;
  }

  const confirmStart = confirm("Send SOS?");
  if(!confirmStart) return;

  document.getElementById("statusText").innerText = "🚨 SOS Activated...";

  navigator.geolocation.getCurrentPosition(pos=>{
    sendLocation(pos,true);
  });

  watchId = navigator.geolocation.watchPosition(pos=>{
    sendLocation(pos,false);
  },{
    enableHighAccuracy:true
  });

}

function stopTracking(){
  if(watchId !== null){
    navigator.geolocation.clearWatch(watchId);
    watchId = null;
    document.getElementById("statusText").innerText = "🛑 SOS stopped";
  }
}

function sendLocation(position,isFirst){
  const lat = position.coords.latitude;
  const lon = position.coords.longitude;
  const mapLink = `https://www.google.com/maps?q=${lat},${lon}`;

  socket.emit("sos-alert", { lat, lon, mapLink, first:isFirst });

  document.getElementById("statusText").innerHTML = `
    🚨 SOS Active <br>
    📍 Updated: ${new Date().toLocaleTimeString()} <br>
    <a href="${mapLink}" target="_blank">Open Location</a>
  `;
}

// optional feedback
socket.on("sos-status",(data)=>{
  console.log(data.message);
});

</script>

</body>
</html>
